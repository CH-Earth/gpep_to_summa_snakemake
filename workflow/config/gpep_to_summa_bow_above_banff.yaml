# Settings for the test case generation of summa forcing data from gpep forcing

# To initiate a new run, review and update the settings below.
# Note that values will be available as a primary key i.e. config['case_name']


case_name: gpep_bow_above_banff
#gpep_forcing_dir: /scratch/dcasson/gpep/transform_tests_yearly/
working_dir: /scratch/dcasson/gpep/transform_tests_yearly/
summa_dir: /scratch/dcasson/gpep/transform_tests_yearly//test/summa/
summa_forcing_dir: /scratch/dcasson/gpep/transform_tests_yearly/test/summa
input_files:
catchment_shp: /project/6044960/dcasson/bow/gpkg/bow_above_banff_elev_band.gpkg
attribute_nc: /project/6044960/dcasson/bow/gpkg/attributes.nc
metsim_base_config: ../config/metsim_base_config.yaml
catchment_shp_hru_id_field: 'HRU_ID'
catchment_shp_lat_id_field: 'latitude'
catchment_shp_lon_id_field: 'longitude'
# The forcing shp will be located in the easymore_intersect_dir
forcing_shp: forcing_shp.shp # Default value
easymore_input_var:
- prcp
- t_max
- t_min
metsim_timestep_minutes: 180
metsim_domain_nc: domain.nc # Default value
out_freq: Y
